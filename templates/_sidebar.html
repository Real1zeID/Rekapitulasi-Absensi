<aside class="sidebar" id="sidebar">
  <div class="sidebar__brand">
    <div class="sidebar__seal" aria-hidden="true">
      <img src="{{ url_for('static', filename='img/logo-kejaksaan.png') }}" alt="">
    </div>
    <div class="sidebar__brand-text">
      <p class="eyebrow eyebrow--sidebar">Kejati Jawa Tengah</p>
      <p class="sidebar__brand-sub">Bidang Daskrimti</p>
    </div>
  </div>

  <nav class="sidebar__nav" aria-label="Navigasi utama">
    <a href="{{ url_for('index') }}" class="sidebar__link {{ 'is-active' if request.endpoint == 'index' else '' }}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v12m0-12 4 4m-4-4-4 4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Rekap Absensi
    </a>
    <a href="{{ url_for('dashboard') }}" class="sidebar__link {{ 'is-active' if request.endpoint == 'dashboard' else '' }}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 19V10m6.5 9V5M17 19v-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Dashboard
    </a>
  </nav>

  <div class="sidebar__footer">
    <div class="sidebar__admin">
      <span class="sidebar__admin-dot" aria-hidden="true"></span>
      {{ admin_nama }}
    </div>
    <form method="post" action="{{ url_for('logout') }}" class="logout-form">
      <button type="submit" class="sidebar__logout">Keluar</button>
    </form>
  </div>
</aside>

<div class="sidebar__overlay" id="sidebarOverlay"></div>
